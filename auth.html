<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AgentFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #080b12; --bg2: #0d1117; --bg3: #161b22;
      --border: #30363d; --blue: #58a6ff; --cyan: #79c0ff;
      --green: #3fb950; --red: #f85149;
      --text: #e6edf3; --text2: #8b949e;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      color: var(--cyan);
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 32px;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 28px;
      background: var(--bg2);
      padding: 4px;
      border-radius: 10px;
    }
    .tab {
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      border-radius: 7px;
      cursor: pointer;
      color: var(--text2);
      transition: all 0.2s;
      border: none;
      background: none;
      font-family: 'Outfit', sans-serif;
    }
    .tab.active {
      background: var(--bg3);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      transition: border-color 0.2s;
    }
    .form-input:focus { outline: none; border-color: var(--blue); }
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: #080b12;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(88,166,255,0.3); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-msg {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg {
      background: rgba(63,185,80,0.1);
      border: 1px solid rgba(63,185,80,0.3);
      color: var(--green);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ AgentFlow</div>
  <div class="subtitle">Automate everything with AI agents</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('signup')">Sign up</button>
  </div>

  <div id="errorMsg" class="error-msg"></div>
  <div id="successMsg" class="success-msg"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="loginPassword" placeholder="Your password"/>
    </div>
    <button class="btn-submit" id="loginBtn" onclick="login()">Login →</button>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" style="display:none;">
    <div class="form-group">
      <label class="form-label">Full name</label>
      <input type="text" class="form-input" id="signupName" placeholder="Mukil"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="signupEmail" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="signupPassword" placeholder="Min 6 characters"/>
    </div>
    <button class="btn-submit" id="signupBtn" onclick="signup()">Create account →</button>
  </div>
</div>

<script>
  const API = 'http://localhost:3001';

  // If already logged in, redirect to dashboard
  if (localStorage.getItem('af_token')) {
    window.location.href = 'dashboard.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
    hideMessages();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    if (!email || !password) { showError('Please fill in all fields!'); return; }
    btn.disabled = true; btn.textContent = 'Logging in...';
    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('af_token', data.token);
        localStorage.setItem('af_user', JSON.stringify(data.user));
        showSuccess('✅ Login successful! Redirecting...');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } else {
        showError(data.error || 'Login failed!');
      }
    } catch (e) {
      showError('Cannot connect to server! Is backend running?');
    }
    btn.disabled = false; btn.textContent = 'Login →';
  }

  async function signup() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const btn = document.getElementById('signupBtn');
    if (!name || !email || !password) { showError('Please fill in all fields!'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters!'); return; }
    btn.disabled = true; btn.textContent = 'Creating account...';
    try {
      const res = await fetch(`${API}/api/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('af_token', data.token);
        localStorage.setItem('af_user', JSON.stringify(data.user));
        showSuccess('✅ Account created! Redirecting...');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } else {
        showError(data.error || 'Signup failed!');
      }
    } catch (e) {
      showError('Cannot connect to server! Is backend running?');
    }
    btn.disabled = false; btn.textContent = 'Create account →';
  }
</script>
</body>
</html>
