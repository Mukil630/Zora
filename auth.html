<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AgentFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #080b12; --bg2: #0d1117; --bg3: #161b22;
      --border: #30363d; --blue: #58a6ff; --cyan: #79c0ff;
      --green: #3fb950; --red: #f85149;
      --text: #e6edf3; --text2: #8b949e;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      color: var(--cyan);
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 32px;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 28px;
      background: var(--bg2);
      padding: 4px;
      border-radius: 10px;
    }
    .tab {
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      border-radius: 7px;
      cursor: pointer;
      color: var(--text2);
      transition: all 0.2s;
      border: none;
      background: none;
      font-family: 'Outfit', sans-serif;
    }
    .tab.active {
      background: var(--bg3);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      transition: border-color 0.2s;
    }
    .form-input:focus { outline: none; border-color: var(--blue); }
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: #080b12;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
